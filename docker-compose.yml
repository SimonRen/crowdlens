services:
  backend:
    build: ./backend
    volumes:
      - ./videos:/app/videos
      - ./data:/app/data
    environment:
      - DETECTION_MODEL=yolo26n
      - CHILD_AGE_THRESHOLD=13
      - CLASSIFICATION_INTERVAL=10
      - GENDER_CONFIDENCE_THRESHOLD=0.6
      - MIN_CROP_HEIGHT=80
      - JPEG_QUALITY=50
      - SNAPSHOT_INTERVAL=5
      - INPUT_RESOLUTION=416
      - MAX_FPS=30
      - DEVICE=cpu
      - DATABASE_PATH=/app/data/monitor.db
      - VIDEOS_DIR=/app/videos
      - FACE_MODEL_NAME=buffalo_sc
      - MATCH_THRESHOLD=0.5
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=8
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${HOST_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped
