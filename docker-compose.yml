services:
  backend:
    build: ./backend
    volumes:
      - ./videos:/app/videos
      - ./data:/app/data
    environment:
      - DETECTION_MODEL=yolo26n
      - CHILD_AGE_THRESHOLD=13
      - CLASSIFICATION_INTERVAL=3
      - GENDER_CONFIDENCE_THRESHOLD=0.6
      - MIN_CROP_HEIGHT=80
      - JPEG_QUALITY=70
      - SNAPSHOT_INTERVAL=5
      - INPUT_RESOLUTION=640
      - MAX_FPS=30
      - DEVICE=cpu
      - DATABASE_PATH=/app/data/monitor.db
      - VIDEOS_DIR=/app/videos
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
